<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SPARMS Dashboard</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard-container">

  <!-- Sidebar -->
  <div class="sidebar">

    <h2 class="logo">SPARMS</h2>

    <ul class="menu">
      <li class="active"><i class="fa-solid fa-table-columns"></i> Dashboard</li>
      <li><i class="fa-solid fa-user-graduate"></i> Students</li>
      <li><i class="fa-solid fa-building"></i> Companies</li>
      <li><i class="fa-solid fa-briefcase"></i> Applications</li>
      <li><i class="fa-solid fa-chart-line"></i> Analytics</li>
    </ul>

  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Navbar -->
    <div class="topbar">

      <h3>Overview</h3>

      <button class="analytics-btn">
        <i class="fa-solid fa-chart-simple"></i>
        Analytics
      </button>

    </div>

    <!-- Hero Banner -->
    <div class="hero-banner">

      <div>
        <h1>Welcome back, Saidivya 👋</h1>
        <p>Track placements, applications, and analytics efficiently.</p>
      </div>

      <i class="fa-solid fa-graduation-cap hero-icon"></i>

    </div>

    <!-- Stats Cards -->
    <div class="cards">

      <div class="card-box">
        <i class="fa-solid fa-paper-plane card-icon blue"></i>
        <div>
          <h2>120</h2>
          <p>Applications</p>
        </div>
      </div>

      <div class="card-box">
        <i class="fa-solid fa-star card-icon orange"></i>
        <div>
          <h2>45</h2>
          <p>Shortlisted</p>
        </div>
      </div>

      <div class="card-box">
        <i class="fa-solid fa-trophy card-icon green"></i>
        <div>
          <h2>32</h2>
          <p>Selected</p>
        </div>
      </div>

      <div class="card-box">
        <i class="fa-solid fa-briefcase card-icon cyan"></i>
        <div>
          <h2>11</h2>
          <p>Open Drives</p>
        </div>
      </div>

    </div>

    <!-- Chart -->
    <div class="chart-container">

      <h4>Branch-wise Placements</h4>

      <canvas id="placementChart"></canvas>

    </div>

  </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
